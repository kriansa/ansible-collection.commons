---
- name: Define secure SSH server standards
  become: true
  notify: Restart ssh
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-secure-defaults.conf
    mode: "0600"
    content: |
      PasswordAuthentication no
      PermitRootLogin no

- name: Restrict su to wheel group only
  become: true
  ansible.builtin.blockinfile:
    path: /etc/pam.d/su
    insertafter: "auth\\s+sufficient\\s+pam_rootok.so"
    block: |
      # Allow wheel members to `su` without password
      auth sufficient pam_wheel.so trust use_uid

- name: Restrict passwordless sudo to wheel group only
  become: true
  ansible.builtin.copy:
    content: |
      # Enable wheel group to execute all commands without password
      %wheel ALL=(ALL) NOPASSWD:ALL
    dest: /etc/sudoers.d/10-wheel
    mode: "0600"

- name: Reset ssh connection
  ansible.builtin.meta: reset_connection

- name: Lock root user password
  become: true
  ansible.builtin.user:
    name: root
    password_lock: true

# Hardens kernel tunables
# See: https://github.com/Kicksecure/security-misc
# See: https://madaidans-insecurities.github.io/guides/linux-hardening.html
# See: https://tails.net/contribute/design/kernel_hardening/
# See: https://kernsec.org/wiki/index.php/Kernel_Self_Protection_Project/Recommended_Settings
- name: Hardens sysctl variables
  become: true
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    sysctl_file: /etc/sysctl.d/80-hardened-settings.conf
  loop:
      ## Hides kernel addresses in various files in /proc.
      ## Kernel addresses can be very useful in certain exploits.
      ##
      ## https://kernsec.org/wiki/index.php/Bug_Classes/Kernel_pointer_leak
    - { name: kernel.kptr_restrict, value: "1" }

      # Panics whenever an oops or bug is encountered.
    - { name: kernel.panic_on_oops, value: "1" }

      # Hardens the BPF JIT compiler and restricts it to root.
    - { name: net.core.bpf_jit_harden, value: "2" }
    - { name: kernel.unprivileged_bpf_disabled, value: "1" }

      # Randomize the addresses for mmap base, heap, stack, and VDSO pages
    - { name: kernel.randomize_va_space, value: "2" }

      ## Restrict loading TTY line disciplines to CAP_SYS_MODULE to prevent
      ## unprivileged attackers from loading vulnerable line disciplines
      ## with the TIOCSETD ioctl which has been used in exploits before
      ## such as https://a13xp0p0v.github.io/2017/03/24/CVE-2017-2636.html
      ##
      ## https://lkml.org/lkml/2019/4/15/890
    - { name: dev.tty.ldisc_autoload, value: "0" }

      ## Restrict the userfaultfd() syscall to root as it can make heap sprays
      ## easier.
      ##
      ## https://duasynt.com/blog/linux-kernel-heap-spray
    - { name: vm.unprivileged_userfaultfd, value: "0" }

      ## Disallow kernel profiling by users without CAP_SYS_ADMIN
      ## https://www.kernel.org/doc/Documentation/sysctl/kernel.txt
    - { name: kernel.perf_event_paranoid, value: "3" }

      # kexec is a system call that is used to boot another kernel during runtime. This functionality
      # can be abused to load a malicious kernel and gain arbitrary code execution in kernel mode, so
      # this sysctl disables it.
    - { name: kernel.kexec_load_disabled, value: "1" }

      ## Disable SysRq key
    - { name: kernel.sysrq, value: "0" }

      ## Restricts the kernel log to root only.
    - { name: kernel.dmesg_restrict, value: "1" }

      ## Don't allow writes to files that we don't own
      ## in world writable sticky directories, unless
      ## they are owned by the owner of the directory.
    - { name: fs.protected_fifos, value: "2" }
    - { name: fs.protected_regular, value: "2" }

      ## Only allow symlinks to be followed when outside of
      ## a world-writable sticky directory, or when the owner
      ## of the symlink and follower match, or when the directory
      ## owner matches the symlink's owner.
      ##
      ## Prevent hardlinks from being created by users that do not
      ## have read/write access to the source file.
      ##
      ## These prevent many TOCTOU races.
    - { name: fs.protected_symlinks, value: "1" }
    - { name: fs.protected_hardlinks, value: "1" }

      ## TIOCSTI is an ioctl system call in the Linux kernel that lets a process simulate terminal
      ## input by pushing characters into the input queue for a controlling TTY. This legacy
      ## mechanism can be abused for malicious purposes.
    - { name: dev.tty.legacy_tiocsti, value: "0" }

# kernel.unprivileged_userns_clone is a Debian/Ubuntu out-of-tree kernel patch
# that was never accepted into mainline Linux. It controls whether unprivileged
# users can create user namespaces while still allowing root to do so — a more
# surgical control than the mainline user.max_user_namespaces sysctl, which
# disables namespaces for everyone and breaks systemd and containers.
#
# RHEL-family systems do not ship this sysctl. They rely on SELinux enforcing
# mode to restrict user namespace abuse at the policy level, which covers the
# same exploit paths without a dedicated toggle.
#
# Restricting this cuts off the primary prerequisite for most nf_tables LPE
# exploits (CVE-2024-1086, CVE-2023-3390, CVE-2023-32233 and similar), which
# require an unprivileged user namespace to obtain CAP_NET_ADMIN scoped to a
# network namespace before attacking the nf_tables subsystem.
- name: Restrict unprivileged user namespace creation (Debian/Ubuntu only)
  become: true
  when: ansible_facts['os_family'] == 'Debian'
  ansible.posix.sysctl:
    name: kernel.unprivileged_userns_clone
    value: "0"
    sysctl_set: true
    sysctl_file: /etc/sysctl.d/80-hardened-settings.conf

# Blacklist unused kernel modules to reduce attack surface.
# Both directives are required per module:
#   blacklist — prevents automatic loading via hotplug/udev
#   install /bin/false — replaces the load operation itself, preventing manual
#                        modprobe and dependency resolution from loading the module
#
# Sources: CIS Benchmark (L1/L2), DISA STIG, NSA/CISA Linux Hardening Guide
- name: Blacklist unused kernel modules
  become: true
  ansible.builtin.copy:
    dest: /etc/modprobe.d/99-hardening.conf
    mode: "0644"
    content: |
      # Filesystems — CIS Benchmark 1.1 / DISA STIG
      # No legitimate server use; attack surface via malicious removable media
      install cramfs /bin/false
      blacklist cramfs
      install freevxfs /bin/false
      blacklist freevxfs
      install hfs /bin/false
      blacklist hfs
      install hfsplus /bin/false
      blacklist hfsplus
      install jffs2 /bin/false
      blacklist jffs2
      install squashfs /bin/false
      blacklist squashfs
      install udf /bin/false
      blacklist udf
      install usb-storage /bin/false
      blacklist usb-storage

      # Network protocols — CIS Benchmark 3.2 / DISA STIG / NSA/CISA
      # No legitimate server use; active CVE history
      install dccp /bin/false
      blacklist dccp
      install sctp /bin/false
      blacklist sctp
      install rds /bin/false
      blacklist rds
      install tipc /bin/false
      blacklist tipc

      # Legacy and obscure network protocols — NSA/CISA Linux Hardening Guide
      # Expand remote attack surface with no modern server use case
      install can /bin/false
      blacklist can
      install n-hdlc /bin/false
      blacklist n-hdlc
      install ax25 /bin/false
      blacklist ax25
      install netrom /bin/false
      blacklist netrom
      install x25 /bin/false
      blacklist x25
      install rose /bin/false
      blacklist rose
      install decnet /bin/false
      blacklist decnet
      install econet /bin/false
      blacklist econet
      install af_802154 /bin/false
      blacklist af_802154
      install ipx /bin/false
      blacklist ipx
      install appletalk /bin/false
      blacklist appletalk
      install atm /bin/false
      blacklist atm

      # CVE-2026-31431 (Copy Fail) — algif_aead allows a deterministic 4-byte
      # write into the page cache of any readable file, including setuid binaries.
      # On Debian/Ubuntu this entry is sufficient. On RHEL-family systems
      # algif_aead may be built-in, making this a no-op — covered by the
      # initcall_blacklist=algif_aead_init arg in the cmdline hardening block.
      install algif_aead /bin/false
      blacklist algif_aead

      # CVE-2026-43284 / CVE-2026-43500 (Dirty Frag) — the IPsec ESP and RxRPC
      # in-place decryption fast paths write decrypted output back over
      # externally-backed page-cache pages, allowing an attacker to corrupt
      # setuid binaries in memory. Only blacklist esp4/esp6 if no IPsec tunnels
      # are in use (WireGuard uses its own wireguard module and is unaffected).
      install esp4 /bin/false
      blacklist esp4
      install esp6 /bin/false
      blacklist esp6
      install rxrpc /bin/false
      blacklist rxrpc

      # Virtual video test driver — no production use; has caused LPE CVEs
      install vivid /bin/false
      blacklist vivid

# Wireless and peripheral modules are only blacklisted on VMs. On bare metal
# hosts these interfaces may exist as real hardware and are left to the
# operator. FireWire and Thunderbolt DMA attacks are mitigated on bare metal
# by the IOMMU settings applied separately.
- name: Blacklist wireless and peripheral modules on VMs
  become: true
  when: ansible_facts.virtualization_role != 'host'
  ansible.builtin.copy:
    dest: /etc/modprobe.d/99-hardening-peripherals.conf
    mode: "0644"
    content: |
      # Wireless and peripherals — CIS Benchmark 3.1 / DISA STIG
      install bluetooth /bin/false
      blacklist bluetooth
      install btusb /bin/false
      blacklist btusb
      install firewire-core /bin/false
      blacklist firewire-core
      install thunderbolt /bin/false
      blacklist thunderbolt

- name: Check if cmdline is hardened
  ansible.builtin.command: grep -q "slab_nomerge" /proc/cmdline
  changed_when: os_base_cmdline_hardened.rc == 0
  failed_when: false
  register: os_base_cmdline_hardened

- name: Hardens kernel command line arguments
  become: true
  when: not os_base_cmdline_hardened.changed
  notify: Reboot
  ansible.builtin.command: grubby --update-kernel=ALL --args="{{ item }}"
  changed_when: true
  loop:
    # Disables the merging of slabs of similar sizes.
    # Sometimes a slab can be used in a vulnerable way which an attacker can exploit.
    - slab_nomerge

    # This option randomises page allocator freelists, improving security by making page allocations
    # less predictable. This also improves performance.
    - page_alloc.shuffle=1

    # Zero memory at allocation and free time.
    - init_on_free=1 init_on_alloc=1

    # Mostly useful for systems with ECC memory, setting mce to 0 will cause the kernel to panic on
    # any uncorrectable errors detected by the machine check exception system. Corrected errors will
    # just be logged. The default is mce=1, which will SIGBUS on many uncorrected errors.
    # Unfortunately this means malicious processes which try to exploit hardware bugginess (such as
    # rowhammer) will be able to try over and over, suffering only a SIGBUS at failure. Setting
    # mce=0 should have no impact. Any hardware which regularly triggers a memory-based MCE is
    # unlikely to even boot, and the default is 1 only for long-lived servers.
    - mce=0

    # Vsyscalls are obsolete, are at fixed addresses and are a target for ROP.
    - vsyscall=none

    # Enables randomisation of the kernel stack offset on syscall entries (introduced in kernel 5.13).
    # https://lkml.org/lkml/2019/3/18/246
    - randomize_kstack_offset=on

    # Restrict access to debugfs since it can contain a lot of sensitive information.
    # https://lkml.org/lkml/2020/7/16/122
    # https://github.com/torvalds/linux/blob/fb1201aececc59990b75ef59fca93ae4aa1e1444/Documentation/admin-guide/kernel-parameters.txt#L835-L848
    - debugfs=off

    # Always enable Kernel Page Table Isolation, even if the CPU claims it is safe from Meltdown.
    - pti=on

    # CVE-2026-31431 (Copy Fail): on RHEL-family systems algif_aead is often
    # compiled built-in (CONFIG_CRYPTO_USER_API_AEAD=y). When built-in, the module
    # never goes through modprobe, so the modprobe.d blacklist silently does nothing
    # and the system remains vulnerable despite appearing to apply the fix.
    #
    # initcall_blacklist prevents the kernel from running algif_aead_init at boot,
    # disabling the subsystem even when compiled in. On Debian/Ubuntu where
    # algif_aead is a loadable module, this arg is a harmless no-op — both
    # the modprobe.d entry and this cmdline arg can coexist safely across distros.
    - initcall_blacklist=algif_aead_init

# These settings are incompatible with low-latency PCIe passthrough (such as GPU passthrough)
# You can disable these security options when you don't have hostile tenant VMs (security is always
# a trade-off anyway)
- name: Hardens kernel command line arguments for bare metal
  become: true
  notify: Reboot
  ansible.builtin.command: grubby --update-kernel=ALL --args="{{ item }}"
  changed_when: true
  when: ansible_facts.virtualization_role == "host" and cmdline_hardened.rc != 0
  loop:
    # Enforce AMD IOMMU isolation
    - amd_iommu=force_isolation

    # Disable the busmaster bit on all PCI bridges during very
    # early boot to avoid holes in IOMMU.
    #
    # This option may cause failures with some poorly behaved hardware and
    # should not be enabled without testing. The kernel commandline options
    # "efi=disable_early_pci_dma" or "efi=no_disable_early_pci_dma" may be
    # used to override the default. Note that PCI devices downstream from PCI
    # bridges are disconnected from their drivers first, using the UEFI
    # driver model API, so that DMA can be disabled safely at the bridge
    # level.
    #
    # https://mjg59.dreamwidth.org/54433.html
    # https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/commit/?id=4444f8541dad16fefd9b8807ad1451e806ef1d94
    - efi=disable_early_pci_dma

    # Enables strict enforcement of IOMMU TLB invalidation so devices will never be able to access stale data contents
    # https://github.com/torvalds/linux/blob/master/drivers/iommu/Kconfig#L97
    # Page 11 of https://lenovopress.lenovo.com/lp1467.pdf
    - iommu=force iommu.passthrough=0 iommu.strict=1

---
- name: Disable automatic makecache
  become: true
  ansible.builtin.systemd:
    name: dnf-makecache.timer
    enabled: false

- name: Enable automatic updates
  become: true
  when: automatic_update_enabled
  block:
    - name: Check if DNF5 is in use
      ansible.builtin.stat:
        path: /usr/bin/dnf5
      register: dnf5_stat

    - name: Set DNF version fact
      ansible.builtin.set_fact:
        dnf5: "{{ dnf5_stat.stat.exists }}"

    - name: Install dnf-automatic (DNF 4)
      ansible.builtin.dnf:
        name: dnf-automatic
        state: present
      when: not dnf5

    - name: Install dnf5-plugin-automatic (DNF 5)
      ansible.builtin.dnf:
        name: dnf5-plugin-automatic
        state: present
      when: dnf5

    - name: Copy default dnf-automatic config if not present (DNF 5)
      ansible.builtin.copy:
        src: /usr/share/dnf5/dnf5-plugins/automatic.conf
        dest: /etc/dnf/automatic.conf
        remote_src: true
        force: false
        mode: "0644"
      when: dnf5

    - name: Configure dnf-automatic
      ansible.builtin.lineinfile:
        path: /etc/dnf/automatic.conf
        regexp: "^{{ item.key }} ="
        line: "{{ item.key }} = {{ item.value }}"
        insertafter: '^\[commands\]'
      loop:
        - key: upgrade_type
          value: "{{ 'default' if automatic_update_type == 'all' else automatic_update_type }}"
        - key: download_updates
          value: "yes"
        - key: apply_updates
          value: "yes"
        - key: reboot
          value: "{{ 'when-needed' if automatic_update_reboot else 'never' }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Create drop-in folder for the dnf-automatic timer
      ansible.builtin.file:
        path: /etc/systemd/system/dnf-automatic.timer.d
        state: directory
        mode: "0755"

    - name: Override the dnf-automatic timer schedule
      ansible.builtin.template:
        src: files/dnf-automatic.timer.j2
        dest: /etc/systemd/system/dnf-automatic.timer.d/override.conf
        mode: "0644"

    - name: Force reload the systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable the dnf-automatic timer
      ansible.builtin.systemd:
        name: dnf-automatic.timer
        enabled: true

---
- ansible.builtin.import_tasks: clean_alma_cloudimage.yml
- ansible.builtin.import_tasks: remove_packages.yml
- ansible.builtin.import_tasks: remove_cron.yml
# Disabled: systemd-timesyncd is not packaged for Fedora at all, and on RHEL it
# is only available via systemd-extras — best-effort at best and likely not
# officially supported. chrony stays the NTP client on the RHEL family.
# - ansible.builtin.import_tasks: setup_timesync.yml
- ansible.builtin.import_tasks: configure_chrony.yml
- ansible.builtin.import_tasks: remove_tuned.yml
- ansible.builtin.import_tasks: update_packages.yml
- ansible.builtin.import_tasks: install_epel.yml
  when: ansible_facts.distribution != 'Fedora'
- ansible.builtin.import_tasks: install_dnf_automatic.yml
- ansible.builtin.import_tasks: normalize_networks.yml
- ansible.builtin.import_tasks: configure_resolved.yml
- ansible.builtin.import_tasks: disable_watchdog.yml
- ansible.builtin.import_tasks: fix_root_user.yml

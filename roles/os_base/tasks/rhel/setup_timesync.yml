---
# Chrony (NTP timesync) is replaced by systemd-timesyncd
- name: Remove chrony
  become: true
  ansible.builtin.dnf:
    name: chrony
    state: absent
    autoremove: true

- name: Install systemd-timesyncd
  become: true
  ansible.builtin.dnf:
    name: systemd-timesyncd
    state: present

- name: Enable and start systemd-timesyncd
  become: true
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started

# NetworkManager's internal DHCP client does not feed DHCP-advertised NTP
# servers to systemd-timesyncd (only systemd-networkd does), so without this
# dispatcher timesyncd only ever uses its FallbackNTP.
- name: Feed DHCP-advertised NTP server to systemd-timesyncd via NetworkManager
  become: true
  ansible.builtin.copy:
    src: 50-timesyncd-dhcp-ntp
    dest: /etc/NetworkManager/dispatcher.d/50-timesyncd-dhcp-ntp
    owner: root
    group: root
    mode: "0755"

- name: Remove chrony user
  become: true
  ansible.builtin.user:
    name: chrony
    state: absent

- name: Remove chrony group
  become: true
  ansible.builtin.group:
    name: chrony
    state: absent

- name: Remove old logs
  become: true
  ansible.builtin.file:
    path: /var/log/chrony
    state: absent

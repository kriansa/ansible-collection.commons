---
# Sets the hostname of this server
hostname: myserver

# Define the default timezone
timezone: UTC

# Explicit NTP servers for chrony (RHEL family). Useful for statically-addressed hosts that don't
# receive NTP via DHCP. Each is added with "iburst prefer" via a chrony sourcedir drop-in, so
# chrony favours them over the default pool (which stays as a fallback). Empty = rely on the pool
# and any DHCP-advertised servers.
ntp_servers: []

# Admin user name. By default, we disable root user and turn this one into an admin which can get
# super user access by using `sudo`
username: admin

# The URL to fetch the authorized_keys from (typically https://github.com/<your_username>.keys)
authorized_keys_url: ""

# Should we remove firewalld? Set to yes if you use on a cloud provider that already provides
# firewall functionality
remove_firewalld: yes

# Debian 12 introduces netplan to manage its systemd-networkd configuration. Should we remove it?
remove_netplan: yes

# Install CloudWatch agent on Amazon Linux
install_cloudwatch: yes

# Remove OS bloat packages not required for servers
remove_bloat: yes

# Install linux-firmware. Defaults to bare-metal hosts only, since guests rarely need firmware
# blobs. Set to true on guests with passed-through hardware that needs firmware (e.g. a GPU).
install_linux_firmware: "{{ ansible_facts.virtualization_role == 'host' }}"

# Should we reboot after the playbook has run if required
reboot_if_needed: yes

# Automatic updates (timezones available at `timedatectl list-timezones`)
automatic_update_enabled: yes
automatic_update_reboot: yes
automatic_update_schedule: "*-*-* 08:30:00 UTC"
automatic_update_type: security  # security or all

# Debian only: when packages are pre-downloaded (apt-daily), as a full systemd OnCalendar expression.
debian_automatic_update_download_schedule: "*-*-* 07:00:00 UTC"
debian_automatic_update_reboot_time: 08:30 UTC
